<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeCast Setup</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-app-region: drag; /* Permet de déplacer la fenêtre */
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--accent);
            text-align: center;
        }
        .form-group {
            width: 100%;
            margin-bottom: 15px;
            -webkit-app-region: no-drag;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background-color: var(--bg-input);
            color: var(--text-primary);
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background-color: var(--accent);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
            -webkit-app-region: no-drag;
        }
        button:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <h2>Configuration MemeCast</h2>
    <div class="form-group">
        <label>Alias de ce client</label>
        <input type="text" id="input-alias" placeholder="Ex: Youwen">
    </div>
    <button id="btn-save">Sauvegarder & Connecter</button>

    <script type="module" src="js/setup.js"></script>
</body>
</html>
