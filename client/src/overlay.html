<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemeCast — Overlay</title>
    <link rel="stylesheet" href="css/overlay.css" />
</head>
<body>
    <!-- 
        Cette page est la fenêtre overlay transparente.
        Le body est 100% transparent, seuls les éléments enfants sont visibles.
        Le click-through est géré côté Rust (set_ignore_cursor_events).
    -->

    <!-- Container pour les mèmes affichés -->
    <div id="overlay-container"></div>

    <!-- Container pour les emojis (réactions) -->
    <div id="react-container"></div>

    <script type="module" src="js/effects.js"></script>
    <script type="module" src="js/queue.js"></script>
    <script type="module" src="js/overlay.js"></script>
    <script type="module" src="js/websocket.js"></script>

    <script type="module">
        // Initialisation : connecter au serveur WebSocket
        document.addEventListener("DOMContentLoaded", () => {
            // Charger la config depuis localStorage (sauvée par la fenêtre settings)
            const config = JSON.parse(localStorage.getItem("memecast_config") || "{}");
            const wsUrl = config.ws_url || "ws://localhost:8000/ws";
            const guildId = config.guild_id || "";
            const discordId = config.discord_id || "";

            if (!guildId || !discordId) {
                console.warn("[MemeCast] Config manquante — en attente de configuration...");
                // On attend que la config soit mise à jour par la fenêtre settings
                const checkInterval = setInterval(() => {
                    const cfg = JSON.parse(localStorage.getItem("memecast_config") || "{}");
                    if (cfg.guild_id && cfg.discord_id) {
                        clearInterval(checkInterval);
                        initWebSocket(cfg.ws_url || "ws://localhost:8000/ws", cfg.guild_id, cfg.discord_id);
                    }
                }, 2000);
                return;
            }

            initWebSocket(wsUrl, guildId, discordId);
        });
    </script>
</body>
</html>
